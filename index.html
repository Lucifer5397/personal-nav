<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航中心</title>
    <style>
        :root {
            --primary-gold: #ffd700;
            --secondary-purple: #8a2be2;
            --accent-cyan: #00ffff;
            --dark-bg: #0f0c1a;
            --light-text: #ffffff;
            --glow-blue: rgba(0, 255, 255, 0.6);
            --glow-purple: rgba(138, 43, 226, 0.4);
            --card-bg: rgba(25, 20, 40, 0.8);
            --btn-primary-gradient: linear-gradient(135deg, #ffd700, #00ffff);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: var(--light-text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        body.page-loaded { opacity: 1 !important; }

        /* 背景画布 */
        #bgCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
        }

        /* 左上角 */
        .header-info {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px;
        }
        .signature {
            font-family: 'STXingkai', 'KaiTi', cursive;
            font-size: 1.5rem; font-weight: bold;
            background: linear-gradient(45deg, var(--primary-gold), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        .clock {
            font-family: 'Courier New', monospace;
            font-size: 1.6rem; font-weight: bold; color: var(--accent-cyan);
            text-shadow: 0 0 12px rgba(0,255,255,0.8);
        }

        /* 右上角设置 */
        .settings-container {
            position: fixed; top: 20px; right: 20px; z-index: 100;
        }
        .settings-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            background: var(--card-bg); cursor: pointer; font-size: 1.4rem;
            backdrop-filter: blur(12px); transition: all 0.3s;
        }
        .settings-btn:hover {
            transform: rotate(90deg) scale(1.2);
            box-shadow: 0 0 25px rgba(0,255,255,0.5);
            background: linear-gradient(45deg, var(--secondary-purple), var(--accent-cyan));
        }

        /* 英雄区 */
        .hero-section { padding: 2.5rem 2rem 1.5rem; text-align: center; }
        .main-title {
            font-size: 3rem; font-weight: bold;
            background: linear-gradient(45deg, var(--primary-gold), var(--accent-cyan), var(--secondary-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.3); }
        }
        .subtitle { font-size: 1.1rem; color: var(--accent-cyan); opacity: 0.8; margin-bottom: 1rem; }

        /* 搜索 */
        .search-container { max-width: 700px; margin: 0 auto 1.5rem; position: relative; }
        .search-input {
            width: 100%; padding: 1rem 1rem 1rem 3rem;
            background: var(--card-bg); border: 2px solid rgba(255,215,0,0.4);
            border-radius: 50px; color: #fff; font-size: 1.1rem;
            backdrop-filter: blur(12px); outline: none; transition: 0.3s;
        }
        .search-input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
        }
        .search-icon { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }

        /* 添加按钮 */
        .add-btn {
            background: var(--btn-primary-gradient);
            border: none; padding: 0.8rem 2rem; border-radius: 30px;
            font-weight: 700; cursor: pointer; font-size: 1rem;
            box-shadow: 0 6px 20px rgba(255,215,0,0.4);
            transition: all 0.3s;
        }
        .add-btn:hover { transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 30px rgba(255,215,0,0.6); }

        /* 分类导航 */
        .category-nav {
            display: flex; justify-content: center; gap: 1rem;
            margin: 1.5rem 0; flex-wrap: wrap;
        }
        .category-btn {
            background: var(--card-bg); border: 2px solid rgba(255,255,255,0.2);
            color: #fff; padding: 0.7rem 1.5rem; border-radius: 16px;
            cursor: pointer; font-size: 1rem; font-weight: 600;
            backdrop-filter: blur(10px); transition: all 0.3s;
        }
        .category-btn:hover { transform: translateY(-3px); border-color: rgba(255,215,0,0.5); }
        .category-btn.active {
            background: var(--btn-primary-gradient); color: #0f0c1a;
            border-color: transparent; transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(255,215,0,0.6);
        }

        /* 书签网格 */
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem; margin-top: 1rem;
        }
        .bookmark-card {
            background: var(--card-bg); border-radius: 20px; padding: 1.8rem;
            text-align: center; cursor: pointer; position: relative;
            backdrop-filter: blur(15px); border: 2px solid rgba(255,255,255,0.15);
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            opacity: 0; transform: translateY(20px);
        }
        .bookmark-card.loaded { opacity: 1; transform: translateY(0); }
        .bookmark-card:hover {
            transform: translateY(-12px) scale(1.06);
            box-shadow: 0 20px 40px rgba(138,43,226,0.5), 0 0 30px rgba(0,255,255,0.4);
            border-color: rgba(255,215,0,0.5);
        }
        .bookmark-icon { font-size: 3rem; margin-bottom: 0.8rem; transition: 0.3s; }
        .bookmark-card:hover .bookmark-icon { transform: scale(1.3) rotate(10deg); }
        .bookmark-title { font-size: 1.4rem; font-weight: 700; color: var(--primary-gold); margin-bottom: 0.5rem; }
        .bookmark-desc { font-size: 0.9rem; color: var(--accent-cyan); opacity: 0.85; }
        .bookmark-cat {
            display: inline-block; margin-top: 0.6rem; padding: 0.2rem 0.7rem;
            border-radius: 10px; font-size: 0.75rem; font-weight: 600;
            background: rgba(255,255,255,0.1);
        }
        /* 三点菜单 */
        .card-menu-btn {
            position: absolute; top: 8px; right: 8px;
            width: 28px; height: 28px; border-radius: 50%; border: none;
            background: transparent; color: rgba(255,255,255,0.5); cursor: pointer;
            opacity: 0; transition: 0.2s; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
            letter-spacing: 1px;
        }
        .bookmark-card:hover .card-menu-btn { opacity: 1; }
        .card-menu-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .card-menu-dropdown {
            position: absolute; top: 36px; right: 4px;
            background: #1e1b2e; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; min-width: 120px; display: none; z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .card-menu-dropdown.show { display: block; }
        .card-menu-dropdown .menu-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px; cursor: pointer; font-size: 0.85rem;
            transition: 0.15s; color: #ddd; white-space: nowrap;
        }
        .card-menu-dropdown .menu-item:hover { background: rgba(255,255,255,0.08); }
        .card-menu-dropdown .menu-item.danger { color: #f87171; }
        .card-menu-dropdown .menu-item.danger:hover { background: rgba(248,113,113,0.12); }

        /* 模态框 */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); justify-content: center; align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card-bg); border-radius: 24px; padding: 2rem;
            width: 90%; max-width: 520px; max-height: 85vh; overflow-y: auto;
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,255,255,0.15);
        }
        .modal-header h2 { color: var(--primary-gold); font-size: 1.5rem; }
        .close-btn {
            width: 40px; height: 40px; border-radius: 50%; border: none;
            background: rgba(255,0,0,0.2); color: #fff; font-size: 1.5rem;
            cursor: pointer; transition: 0.3s;
        }
        .close-btn:hover { background: rgba(255,0,0,0.5); transform: rotate(90deg); }

        /* 表单 */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.4rem; color: var(--accent-cyan); font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.7rem 1rem;
            background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: #fff; font-size: 0.95rem;
            outline: none; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 15px rgba(255,215,0,0.4);
        }
        .btn-primary {
            background: var(--btn-primary-gradient); border: none;
            padding: 0.7rem 1.8rem; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,215,0,0.5); }
        .btn-cancel:hover { background: rgba(255,0,0,0.2) !important; border-color: rgba(255,0,0,0.4) !important; }

        /* 设置tab */
        .settings-tabs { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; }
        .tab-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            color: #fff; padding: 0.6rem 1.2rem; border-radius: 14px;
            cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .tab-btn.active { background: var(--btn-primary-gradient); color: #0f0c1a; border-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .cat-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem; background: rgba(255,255,255,0.06); border-radius: 12px;
            margin-bottom: 0.6rem;
        }
        .cat-name { font-weight: 700; color: var(--primary-gold); }
        .cat-actions { display: flex; gap: 0.5rem; }
        .cat-actions button {
            padding: 0.3rem 0.8rem; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: #fff; cursor: pointer;
            font-size: 0.8rem; transition: 0.2s;
        }
        .cat-actions button:hover { background: var(--btn-primary-gradient); color: #0f0c1a; }

        .bm-edit-item {
            display: flex; align-items: center; padding: 0.8rem;
            background: rgba(255,255,255,0.06); border-radius: 12px;
            margin-bottom: 0.5rem; gap: 0.8rem;
        }
        .bm-edit-item .bm-icon { font-size: 1.5rem; }
        .bm-edit-item .bm-info { flex: 1; }
        .bm-edit-item .bm-info .bm-name { font-weight: 600; color: var(--primary-gold); }
        .bm-edit-item .bm-info .bm-url { font-size: 0.8rem; color: var(--accent-cyan); opacity: 0.8; }

        .footer { text-align: center; padding: 2rem; margin-top: 3rem; opacity: 0.7; }

        @media (max-width: 768px) {
            .main-title { font-size: 2.2rem; }
            .bookmark-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; }
        }
        @media (max-width: 480px) {
            .bookmark-grid { grid-template-columns: 1fr; }
            .category-nav { gap: 0.5rem; }
            .category-btn { padding: 0.5rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="header-info">
    <div class="signature">个人导航中心</div>
    <div class="clock" id="clock"></div>
</div>

<div class="settings-container">
    <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
</div>

<header class="hero-section">
    <h1 class="main-title" id="heroTitle">个人导航中心</h1>
    <p class="subtitle" id="heroSubtitle">通往数字世界的门户</p>
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索书签...">
    </div>
    <button class="add-btn" id="addBookmarkBtn">+ 添加书签</button>
</header>

<main class="container">
    <nav class="category-nav" id="categoryNav">
        <button class="category-btn active" data-category="all">全部</button>
    </nav>
    <div class="bookmark-grid" id="bookmarkGrid"></div>
</main>

<!-- 书签编辑模态框 -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="editModalTitle">添加书签</h2>
            <button class="close-btn" id="closeEditModal">&times;</button>
        </div>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="editTitle" required maxlength="100">
            </div>
            <div class="form-group">
                <label>网址</label>
                <input type="text" id="editUrl" required placeholder="https://...">
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" id="editDesc" maxlength="200">
            </div>
            <div class="form-group">
                <label>图标 (emoji)</label>
                <input type="text" id="editIcon" maxlength="5" value="🌐">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="editCategory"></select>
            </div>
            <button type="submit" class="btn-primary">保存</button>
        </form>
    </div>
</div>

<!-- 设置模态框 -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>设置</h2>
            <button class="close-btn" id="closeSettings">&times;</button>
        </div>
        <div class="settings-tabs">
            <button class="tab-btn active" data-tab="categories">分类管理</button>
            <button class="tab-btn" data-tab="personalize">个性设置</button>
        </div>
        <div class="tab-content active" id="categoriesTab">
            <h3 style="color:var(--accent-cyan);margin-bottom:1rem;">分类列表</h3>
            <div id="catList"></div>
            <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1);">
                <button class="btn-primary" id="showAddCatDialogBtn" style="width:100%;">+ 添加分类</button>
            </div>
            <!-- 添加分类对话框 -->
            <div id="addCatDialog" style="display:none;margin-top:1rem;padding:1.2rem;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid rgba(255,215,0,0.3);">
                <label style="color:var(--accent-cyan);font-weight:600;display:block;margin-bottom:0.5rem;">分类名称</label>
                <input type="text" id="newCatName" placeholder="输入分类名称后按回车..." style="width:100%;padding:0.7rem 1rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:0.95rem;outline:none;margin-bottom:0.8rem;"
                       onfocus="this.style.borderColor='var(--primary-gold)';this.style.boxShadow='0 0 12px rgba(255,215,0,0.3)'"
                       onblur="this.style.borderColor='rgba(255,255,255,0.2)';this.style.boxShadow='none'">
                <div style="display:flex;gap:0.6rem;justify-content:flex-end;">
                    <button class="btn-cancel" id="cancelAddCatBtn" style="padding:0.5rem 1.2rem;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;transition:0.2s;">取消</button>
                    <button class="btn-primary" id="confirmAddCatBtn" style="padding:0.5rem 1.2rem;">确定</button>
                </div>
            </div>
        </div>
        <div class="tab-content" id="personalizeTab">
            <h3 style="color:var(--accent-cyan);margin-bottom:1rem;">个性设置</h3>
            <div class="form-group">
                <label>主标题</label>
                <input type="text" id="settingTitle" maxlength="30" placeholder="个人导航中心">
            </div>
            <div class="form-group">
                <label>副标题</label>
                <input type="text" id="settingSubtitle" maxlength="50" placeholder="通往数字世界的门户">
            </div>
            <button class="btn-primary" id="savePersonalizeBtn">保存</button>
            <span id="personalizeSaved" style="display:none;margin-left:0.8rem;color:#4ade80;font-size:0.9rem;">✓ 已保存</span>
        </div>
    </div>
</div>

<footer class="footer"><p>基于 MySQL | 2026</p></footer>

<script>
// ==================== API ====================
const API = '/api';

async function api(url, options = {}) {
    const res = await fetch(API + url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
    });
    return res.json();
}

// ==================== 全局状态 ====================
let bookmarks = [];
let categories = {};
let currentFilter = 'all';
let currentSearch = '';
const DEFAULT_TITLE = '个人导航中心';
const DEFAULT_SUBTITLE = '通往数字世界的门户';

// ==================== 加载数据 ====================
async function loadBookmarks() {
    const resp = await api('/bookmarks');
    bookmarks = resp;
    renderBookmarks();
}

async function loadCategories() {
    const resp = await api('/categories');
    categories = {};
    resp.forEach(c => { categories[c.cat_key] = { name: c.cat_name, color: c.cat_color }; });
    renderCategoryNav();
    renderSettingsCatList();
    fillCategorySelect();
}

// ==================== 渲染 ====================
function renderCategoryNav() {
    const nav = document.getElementById('categoryNav');
    nav.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'category-btn active';
    allBtn.dataset.category = 'all';
    allBtn.textContent = '全部';
    allBtn.onclick = () => { currentFilter = 'all'; renderBookmarks(); updateActiveCat('all'); };
    nav.appendChild(allBtn);
    Object.keys(categories).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.category = key;
        btn.textContent = categories[key].name;
        btn.onclick = () => { currentFilter = key; renderBookmarks(); updateActiveCat(key); };
        nav.appendChild(btn);
    });
}

function updateActiveCat(cat) {
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.category-btn[data-category="${cat}"]`);
    if (btn) btn.classList.add('active');
}

function renderBookmarks() {
    const grid = document.getElementById('bookmarkGrid');
    let filtered = currentFilter === 'all' ? bookmarks : bookmarks.filter(b => b.category === currentFilter);
    const s = currentSearch.toLowerCase();
    if (s) {
        filtered = filtered.filter(b =>
            b.title.toLowerCase().includes(s) ||
            b.description.toLowerCase().includes(s) ||
            b.url.toLowerCase().includes(s) ||
            (categories[b.category] && categories[b.category].name.toLowerCase().includes(s))
        );
    }
    grid.innerHTML = '';
    filtered.forEach((b, i) => {
        const card = document.createElement('div');
        card.className = 'bookmark-card';
        card.innerHTML = `
            <button class="card-menu-btn" title="更多操作">⋮</button>
            <div class="card-menu-dropdown">
                <div class="menu-item edit-item">✏️ 编辑</div>
                <div class="menu-item danger del-item">🗑 删除</div>
            </div>
            <div class="bookmark-icon">${b.icon || '🌐'}</div>
            <div class="bookmark-title">${b.title}</div>
            <div class="bookmark-desc">${b.description || ''}</div>
            <span class="bookmark-cat" style="color:${(categories[b.category]||{}).color||'#fff'}">${(categories[b.category]||{}).name||b.category}</span>
        `;
        const menuBtn = card.querySelector('.card-menu-btn');
        const dropdown = card.querySelector('.card-menu-dropdown');

        menuBtn.onclick = (e) => {
            e.stopPropagation();
            // 关闭其他已打开的菜单
            document.querySelectorAll('.card-menu-dropdown.show').forEach(d => {
                if (d !== dropdown) d.classList.remove('show');
            });
            dropdown.classList.toggle('show');
        };
        card.querySelector('.edit-item').onclick = (e) => {
            e.stopPropagation();
            dropdown.classList.remove('show');
            openEditModal(b);
        };
        card.querySelector('.del-item').onclick = (e) => {
            e.stopPropagation();
            dropdown.classList.remove('show');
            deleteBookmark(b.id);
        };
        card.onclick = (e) => {
            // 点击卡片本体打开链接（排除菜单区域）
            if (e.target.closest('.card-menu-btn') || e.target.closest('.card-menu-dropdown')) return;
            window.open(b.url, '_blank');
        };
        grid.appendChild(card);
        setTimeout(() => card.classList.add('loaded'), i * 25);
    });

    // 全局点击关闭菜单
    if (!document._menuCloseBound) {
        document.addEventListener('click', () => {
            document.querySelectorAll('.card-menu-dropdown.show').forEach(d => d.classList.remove('show'));
        });
        document._menuCloseBound = true;
    }
}

// ==================== CRUD ====================
async function addBookmark() {
    const title = prompt('网站标题:');
    if (!title) return;
    const url = prompt('网址 (https://...):');
    if (!url) return;
    const desc = prompt('描述:') || '';
    const icon = prompt('图标 emoji:', '🌐') || '🌐';
    let catOpts = Object.keys(categories).map(k => `${k}=${categories[k].name}`).join(', ');
    const cat = prompt(`分类 (${catOpts}):`, 'tools') || 'tools';

    await api('/bookmarks', {
        method: 'POST',
        body: JSON.stringify({ title, url, description: desc, icon, category: cat })
    });
    await loadBookmarks();
}

async function deleteBookmark(id) {
    if (!confirm('确定删除？')) return;
    await api(`/bookmarks/${id}`, { method: 'DELETE' });
    await loadBookmarks();
}

async function saveBookmark(e) {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const data = {
        title: document.getElementById('editTitle').value,
        url: document.getElementById('editUrl').value,
        description: document.getElementById('editDesc').value,
        icon: document.getElementById('editIcon').value,
        category: document.getElementById('editCategory').value,
    };
    if (id) {
        await api(`/bookmarks/${id}`, { method: 'PUT', body: JSON.stringify(data) });
    } else {
        await api('/bookmarks', { method: 'POST', body: JSON.stringify(data) });
    }
    document.getElementById('editModal').classList.remove('show');
    await loadBookmarks();
}

function openEditModal(bm = null) {
    document.getElementById('editId').value = bm ? bm.id : '';
    document.getElementById('editTitle').value = bm ? bm.title : '';
    document.getElementById('editUrl').value = bm ? bm.url : '';
    document.getElementById('editDesc').value = bm ? bm.description : '';
    document.getElementById('editIcon').value = bm ? bm.icon : '🌐';
    document.getElementById('editModalTitle').textContent = bm ? '编辑书签' : '添加书签';
    fillCategorySelect(bm ? bm.category : 'tools');
    document.getElementById('editModal').classList.add('show');
}

function fillCategorySelect(selected = 'tools') {
    const sel = document.getElementById('editCategory');
    sel.innerHTML = '';
    Object.keys(categories).forEach(key => {
        sel.innerHTML += `<option value="${key}" ${key === selected ? 'selected' : ''}>${categories[key].name}</option>`;
    });
}

// ==================== 设置 ====================
function renderSettingsCatList() {
    const container = document.getElementById('catList');
    container.innerHTML = Object.keys(categories).map(key => `
        <div class="cat-item">
            <span class="cat-name">${categories[key].name}</span>
            <div class="cat-actions">
                <button onclick="editCategory('${key}')">修改</button>
                <button onclick="deleteCategory('${key}')">删除</button>
            </div>
        </div>
    `).join('');
}

async function addCategory() {
    const input = document.getElementById('newCatName');
    const name = input.value.trim();
    if (!name) return;
    const key = name.replace(/\s+/g, '-').toLowerCase();
    const colors = ['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#feca57','#ff9aa2','#e2f0cb'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const resp = await api('/categories', {
        method: 'POST',
        body: JSON.stringify({ cat_key: key, cat_name: name, cat_color: color })
    });
    if (resp.error) { alert(resp.error); return; }
    input.value = '';
    document.getElementById('addCatDialog').style.display = 'none';
    document.getElementById('showAddCatDialogBtn').style.display = '';
    await loadCategories();
}

function showAddCatDialog() {
    document.getElementById('addCatDialog').style.display = 'block';
    document.getElementById('showAddCatDialogBtn').style.display = 'none';
    const input = document.getElementById('newCatName');
    input.value = '';
    input.focus();
}

function hideAddCatDialog() {
    document.getElementById('addCatDialog').style.display = 'none';
    document.getElementById('showAddCatDialogBtn').style.display = '';
    document.getElementById('newCatName').value = '';
}

async function editCategory(key) {
    const newName = prompt('新名称:', categories[key].name);
    if (!newName || newName.trim() === categories[key].name) return;
    await api(`/categories/${key}`, { method: 'PUT', body: JSON.stringify({ cat_name: newName.trim() }) });
    await loadCategories();
    await loadBookmarks();
}

async function deleteCategory(key) {
    if (!confirm(`删除分类 "${categories[key].name}"？该分类下书签将移至"工具"。`)) return;
    await api(`/categories/${key}`, { method: 'DELETE' });
    await loadCategories();
    await loadBookmarks();
}

// ==================== 个性设置 ====================
function loadSiteConfig() {
    const title = localStorage.getItem('siteTitle') || DEFAULT_TITLE;
    const subtitle = localStorage.getItem('siteSubtitle') || DEFAULT_SUBTITLE;
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroSubtitle').textContent = subtitle;
}

function savePersonalize() {
    const title = document.getElementById('settingTitle').value.trim() || DEFAULT_TITLE;
    const subtitle = document.getElementById('settingSubtitle').value.trim() || DEFAULT_SUBTITLE;
    localStorage.setItem('siteTitle', title);
    localStorage.setItem('siteSubtitle', subtitle);
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroSubtitle').textContent = subtitle;
    document.getElementById('personalizeSaved').style.display = 'inline';
    setTimeout(() => {
        document.getElementById('personalizeSaved').style.display = 'none';
    }, 2000);
}

function initPersonalizeTab() {
    document.getElementById('settingTitle').value = localStorage.getItem('siteTitle') || DEFAULT_TITLE;
    document.getElementById('settingSubtitle').value = localStorage.getItem('siteSubtitle') || DEFAULT_SUBTITLE;
    document.getElementById('personalizeSaved').style.display = 'none';
}

document.getElementById('savePersonalizeBtn').addEventListener('click', savePersonalize);
['settingTitle', 'settingSubtitle'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter') savePersonalize();
    });
});

// ==================== 背景动画 ====================
function initBackground() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const count = Math.floor(w * h / 2500);
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * w, y: Math.random() * h,
            size: Math.random() * 1.5 + 0.5,
            speed: Math.random() * 0.5 + 0.1,
            angle: Math.random() * Math.PI * 2,
            opacity: Math.random() * 0.3 + 0.1,
            color: Math.random() > 0.7 ? '#ffd700' : '#00ffff'
        });
    }

    function animate() {
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, '#0a0815');
        grad.addColorStop(1, '#120f25');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        particles.forEach(p => {
            p.x += Math.cos(p.angle) * p.speed;
            p.y += Math.sin(p.angle) * p.speed;
            if (p.x < 0) p.x = w;
            if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h;
            if (p.y > h) p.y = 0;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.opacity;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
    }
    animate();
}

// ==================== 时钟 ====================
function updateClock() {
    const now = new Date();
    const str = now.getFullYear() + '-' +
        String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0') + ':' +
        String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = str;
}

// ==================== 初始化 ====================
async function init() {
    document.body.classList.add('page-loaded');
    loadSiteConfig();
    initBackground();
    updateClock();
    setInterval(updateClock, 1000);

    await loadCategories();
    await loadBookmarks();

    // 搜索
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderBookmarks();
    });

    // 添加书签按钮
    document.getElementById('addBookmarkBtn').addEventListener('click', addBookmark);

    // 编辑表单
    document.getElementById('editForm').addEventListener('submit', saveBookmark);
    document.getElementById('closeEditModal').addEventListener('click', () => {
        document.getElementById('editModal').classList.remove('show');
    });

    // 设置模态框
    document.getElementById('settingsBtn').addEventListener('click', () => {
        renderSettingsCatList();
        initPersonalizeTab();
        document.getElementById('settingsModal').classList.add('show');
    });
    document.getElementById('closeSettings').addEventListener('click', () => {
        document.getElementById('settingsModal').classList.remove('show');
    });

    // 设置tab切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab + 'Tab').classList.add('active');
        });
    });

    // 添加分类 - 对话框模式
    document.getElementById('showAddCatDialogBtn').addEventListener('click', showAddCatDialog);
    document.getElementById('confirmAddCatBtn').addEventListener('click', addCategory);
    document.getElementById('cancelAddCatBtn').addEventListener('click', hideAddCatDialog);
    document.getElementById('newCatName').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addCategory();
        if (e.key === 'Escape') hideAddCatDialog();
    });

    // 点击模态框背景关闭
    document.querySelectorAll('.modal').forEach(m => {
        m.addEventListener('click', (e) => { if (e.target === m) m.classList.remove('show'); });
    });

    // 键盘快捷键 Ctrl+数字 打开对应书签
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key >= '1' && e.key <= '9') {
            const idx = parseInt(e.key) - 1;
            if (idx < bookmarks.length) window.open(bookmarks[idx].url, '_blank');
        }
    });
}

document.addEventListener('DOMContentLoaded', init);
</script>
