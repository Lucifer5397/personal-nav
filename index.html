<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人导航中心</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="header-info">
    <canvas class="analog-clock" id="analogClock" width="250" height="250"></canvas>
</div>

<div class="settings-container">
    <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
</div>

<header class="hero-section">
    <h1 class="main-title" id="heroTitle">个人导航中心</h1>
    <p class="subtitle" id="heroSubtitle">通往数字世界的门户</p>
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索书签...">
    </div>
    <button class="add-btn" id="addBookmarkBtn">+ 添加书签</button>
</header>

<main class="container">
    <nav class="category-nav" id="categoryNav">
        <button class="category-btn active" data-category="all">全部</button>
    </nav>
    <div class="subcat-filter" id="subcatFilter" style="display:none;"></div>
    <div class="az-bar" id="azBar">
        <button class="az-btn active" data-letter="all">全</button>
    </div>
    <div class="bookmark-grid" id="bookmarkGrid"></div>
    <div class="no-results" id="noResults" style="display:none;text-align:center;padding:3rem;color:#9ca3af;">没有匹配的书签</div>
</main>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="editModalTitle">添加书签</h2>
            <button class="close-btn" id="closeEditModal">&times;</button>
        </div>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="editTitle" required maxlength="100">
            </div>
            <div class="form-group">
                <label>网址</label>
                <input type="text" id="editUrl" required placeholder="https://...">
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" id="editDesc" maxlength="200">
            </div>
            <div class="form-group">
                <label>图标 (emoji)</label>
                <input type="text" id="editIcon" maxlength="5" value="🌐">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="editCategory"></select>
            </div>
            <button type="submit" class="btn-primary">保存</button>
        </form>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>设置</h2>
            <button class="close-btn" id="closeSettings">&times;</button>
        </div>
        <div class="settings-tabs">
            <button class="tab-btn active" data-tab="categories">分类管理</button>
            <button class="tab-btn" data-tab="personalize">个性设置</button>
        </div>
        <div class="tab-content active" id="categoriesTab">
            <h3 style="color:var(--accent-cyan);margin-bottom:1rem;">分类列表</h3>
            <div id="catList"></div>
            <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.1);">
                <button class="btn-primary" id="showAddCatDialogBtn" style="width:100%;">+ 添加分类</button>
            </div>
            <div id="addCatDialog" style="display:none;margin-top:1rem;padding:1.2rem;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid rgba(255,215,0,0.3);">
                <label style="color:var(--accent-cyan);font-weight:600;display:block;margin-bottom:0.5rem;">分类名称</label>
                <input type="text" id="newCatName" placeholder="输入分类名称后按回车..." style="width:100%;padding:0.7rem 1rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:0.95rem;outline:none;margin-bottom:0.8rem;"
                       onfocus="this.style.borderColor='var(--primary-gold)';this.style.boxShadow='0 0 12px rgba(255,215,0,0.3)'"
                       onblur="this.style.borderColor='rgba(255,255,255,0.2)';this.style.boxShadow='none'">
                <div style="display:flex;gap:0.6rem;justify-content:flex-end;">
                    <button class="btn-cancel" id="cancelAddCatBtn" style="padding:0.5rem 1.2rem;border-radius:10px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;transition:0.2s;">取消</button>
                    <button class="btn-primary" id="confirmAddCatBtn" style="padding:0.5rem 1.2rem;">确定</button>
                </div>
            </div>
        </div>
        <div class="tab-content" id="personalizeTab">
            <h3 style="color:var(--accent-cyan);margin-bottom:1rem;">个性设置</h3>
            <div class="form-group">
                <label>主标题</label>
                <input type="text" id="settingTitle" maxlength="30" placeholder="个人导航中心">
            </div>
            <div class="form-group">
                <label>副标题</label>
                <input type="text" id="settingSubtitle" maxlength="50" placeholder="通往数字世界的门户">
            </div>
            <button class="btn-primary" id="savePersonalizeBtn">保存</button>
            <span id="personalizeSaved" style="display:none;margin-left:0.8rem;color:#4ade80;font-size:0.9rem;">✓ 已保存</span>
        </div>
    </div>
</div>

<footer class="footer"><p>基于 MySQL | 2026</p></footer>

<script src="/static/script.js"></script>
</body>
</html>
